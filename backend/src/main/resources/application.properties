spring.application.name=absence-manager

server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AbsenceManager;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=@ITB123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Mantem update para desenvolvimento com banco criado manualmente no SSMS sem recriar/apagar tabelas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

spring.sql.init.mode=never

app.jwt.secret=${JWT_SECRET:dev-secret-change-this-key-songschool-absence-manager}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

