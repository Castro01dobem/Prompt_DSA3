spring.application.name=absence-manager
server.port=${PORT:8080}
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=absence_manager;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:Password123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:dev-secret-change-this-key-songschool-absence-manager}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081,http://localhost:19006}

